services:
  catalogue:
    build:
    dockerfile: catalogue.dockerfile
    image: ./catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build:
    dockefile: user.dockerfile
    image: ./user:1.0.0
    container_name: user
    depends_on: redis
  frontend:
    build:
    dockerfile: frontend.dockerfile
    image: ./frontend:1.0.0
    container_name: frontend
    depends_on:
    -catalogue
    -user

  mongodb:
    build:
    dockerfile: mongodb.dockerfile
    image: ./mongodb:1.0.0
    container_name: mongodb
  redis: 
    image: redis:7.0
    container_name: redis


  network:
    defalut:
    driver: bridge
    name: roboshop
    external: false, # if true we need to create a network manually

